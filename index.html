<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biscuiterie L'Artisan</title>
  <link rel="stylesheet" href="/src/styles/base.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gris-50, #F8F9FB);
      text-align: center;
    }
    .vitrine { max-width: 560px; padding: var(--espace-6); }
    .vitrine-marque { display: inline-flex; width: 220px; margin: 0 auto var(--espace-4); }
    .vitrine-marque img { width: 100%; height: auto; display: block; }
    .vitrine p { color: var(--texte-attenue); font-size: 1.05rem; }
  </style>
</head>
<body>
  <div class="vitrine">
    <div class="vitrine-marque">
      <img src="%BASE_URL%logo-complet.png" alt="Biscuiterie L'Artisan" />
    </div>
    <p>Biscuiterie artisanale — gestion de la distribution et des livraisons.</p>
  </div>
</body>
</html>
