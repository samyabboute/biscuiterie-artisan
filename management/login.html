<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Biscuiterie L'Artisan</title>
  <link rel="stylesheet" href="/src/styles/base.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--vert-fonce) 0%, var(--vert-fonce-fonce) 100%);
    }
    @keyframes entree-connexion { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .connexion-carte {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--ombre-forte);
      padding: var(--espace-7) var(--espace-6);
      animation: entree-connexion 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .connexion-logo { text-align: center; margin-bottom: var(--espace-5); }
    .connexion-logo-marque { display: inline-flex; width: 150px; margin-bottom: var(--espace-2); }
    .connexion-logo-marque img { width: 100%; height: auto; display: block; }
    .connexion-logo .sous { display: block; font-size: 0.8rem; color: var(--texte-attenue); letter-spacing: 0.08em; text-transform: uppercase; }
    .connexion-carte .bouton { width: 100%; margin-top: var(--espace-2); }
    #matricule { text-transform: uppercase; }
  </style>
</head>
<body>
  <form class="connexion-carte" id="formulaire-connexion" autocomplete="off">
    <div class="connexion-logo">
      <div class="connexion-logo-marque">
        <img src="%BASE_URL%logo-complet.png" alt="Biscuiterie L'Artisan" />
      </div>
      <span class="sous">Espace interne</span>
    </div>

    <div id="zone-message"></div>

    <div class="champ">
      <label for="matricule">Matricule</label>
      <input type="text" id="matricule" name="matricule" placeholder="ART-LOG-0027" required />
    </div>

    <div class="champ">
      <label for="mot-de-passe">Mot de passe</label>
      <input type="password" id="mot-de-passe" name="mot-de-passe" required />
    </div>

    <button type="submit" class="bouton bouton-primaire" id="bouton-connexion">Se connecter</button>
  </form>

  <script type="module" src="/management/login.js"></script>
</body>
</html>
